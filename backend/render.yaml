services:
  - type: web
    name: merge-backend
    runtime: python
    buildCommand: "pip install -e '.[dev]'"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DEBUG
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_OAUTH_REDIRECT_URI
        sync: false
      - key: FEEDBACK_LIKE_BOOST
        value: "10.0"
      - key: FEEDBACK_DISLIKE_PENALTY
        value: "10.0"
      - key: FEEDBACK_SKIP_PENALTY
        value: "5.0"

  - type: worker
    name: merge-celery-worker
    runtime: python
    buildCommand: "pip install -e '.[dev]'"
    startCommand: "celery -A app.tasks worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false

  - type: web
    name: merge-flower-dashboard
    runtime: python
    buildCommand: "pip install -e '.[dev]'"
    startCommand: "celery -A app.tasks flower --port=$PORT"
    envVars:
      - key: REDIS_URL
        sync: false
      - key: FLOWER_BASIC_AUTH
        sync: false
